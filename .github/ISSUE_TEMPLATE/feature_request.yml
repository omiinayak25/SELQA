name: ✨ Feature Request
description: Propose a new capability or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What gap or pain point does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the framework do? Which package/layer?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [UI, API, Database, BDD, Reporting, Observability, Cloud, Security, Performance, AI/Healing, DevOps, Docs]
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a PR for this
