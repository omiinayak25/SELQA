name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "🚀 Features"
    labels: ["enhancement", "feature"]
  - title: "🐛 Bug Fixes"
    labels: ["bug", "fix"]
  - title: "🧪 Tests & Coverage"
    labels: ["tests"]
  - title: "📝 Documentation"
    labels: ["documentation", "docs"]
  - title: "🔧 Build, CI & DevOps"
    labels: ["ci", "build", "docker"]
  - title: "🔐 Security"
    labels: ["security"]
  - title: "⬆️ Dependencies"
    labels: ["dependencies"]
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
version-resolver:
  major:
    labels: ["major", "breaking"]
  minor:
    labels: ["minor", "enhancement", "feature"]
  patch:
    labels: ["patch", "bug", "fix", "dependencies"]
  default: patch
template: |
  ## What's Changed
  $CHANGES

  **Full Changelog**: https://github.com/omiinayak25/SELQA/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
