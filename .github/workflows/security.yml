name: Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ----------------------------------------------- secret scanning (gitleaks)
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  # ----------------------------------------------- dependency CVE scan (OWASP)
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run OWASP dependency-check (fails on CVSS >= 8)
        run: mvn -B -P security verify -DskipTests
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          if-no-files-found: ignore

  # ----------------------------------------------- SBOM (CycloneDX)
  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build SBOM
        run: mvn -B -P sbom cyclonedx:makeAggregateBom -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: target/bom.*
          if-no-files-found: ignore
