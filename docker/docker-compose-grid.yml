# =====================================================================
#  OmiinQA :: Selenium Grid 4 (Hub + per-browser nodes)
#  Usage:
#    docker compose -f docker/docker-compose-grid.yml up -d --scale chrome=3
#    mvn test -Dsuite.file=testng-ui.xml -Dexecution.mode=grid \
#             -Dgrid.url=http://localhost:4444/wd/hub -Dbrowser=remote-chrome
#  Console: http://localhost:4444  |  Live VNC sessions exposed per node.
# =====================================================================
services:

  selenium-hub:
    image: selenium/hub:4.27.0
    container_name: omiinqa-selenium-hub
    ports:
      - "4442:4442"   # event bus publish
      - "4443:4443"   # event bus subscribe
      - "4444:4444"   # router / console
    healthcheck:
      test: ["CMD", "/opt/bin/check-grid.sh", "--host", "0.0.0.0", "--port", "4444"]
      interval: 15s
      timeout: 30s
      retries: 5

  chrome:
    image: selenium/node-chrome:4.27.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=4
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
      - SE_VNC_NO_PASSWORD=1

  firefox:
    image: selenium/node-firefox:4.27.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=4
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
      - SE_VNC_NO_PASSWORD=1

  edge:
    image: selenium/node-edge:4.27.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
      - SE_VNC_NO_PASSWORD=1
