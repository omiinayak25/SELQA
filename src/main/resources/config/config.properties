# =====================================================================
#  OmiinQA :: Base framework configuration (defaults)
#  Override per environment in config/env/<env>.properties
#  Override at runtime with -Dkey=value (highest precedence).
# =====================================================================

# ---- Execution ----
browser=chrome
headless=true
execution.mode=local
# local | remote | grid
grid.url=http://localhost:4444/wd/hub
env=qa

# ---- Timeouts (seconds) ----
timeout.implicit=0
timeout.explicit=15
timeout.pageload=30
timeout.script=20
timeout.polling.millis=500

# ---- Retry ----
retry.count=2
retry.driver.count=2

# ---- Window ----
browser.maximize=true
browser.window.width=1920
browser.window.height=1080

# ---- Screenshots / evidence ----
screenshot.on.failure=true
screenshot.on.success=false
screenshot.dir=screenshots
video.enabled=false

# ---- Reporting ----
report.extent.enabled=true
report.allure.enabled=true
report.extent.path=extent-reports/OmiinQA-Report.html

# ---- Application base URLs (UI) ----
app.saucedemo.url=https://www.saucedemo.com
app.orangehrm.url=https://opensource-demo.orangehrmlive.com
app.theinternet.url=https://the-internet.herokuapp.com

# ---- Application base URLs (API) ----
api.restfulbooker.url=https://restful-booker.herokuapp.com
api.reqres.url=https://reqres.in/api
api.dummyjson.url=https://dummyjson.com
api.petstore.url=https://petstore.swagger.io/v2
api.jsonplaceholder.url=https://jsonplaceholder.typicode.com
api.httpbin.url=https://httpbin.org
api.countries.graphql.url=https://countries.trevorblades.com

# ---- Database (override secrets via env or secrets.properties) ----
db.postgres.url=jdbc:postgresql://localhost:5432/omiinqa
db.postgres.user=omiinqa
db.postgres.password=
db.mysql.url=jdbc:mysql://localhost:3306/omiinqa
db.mysql.user=omiinqa
db.mysql.password=
db.pool.size=5
